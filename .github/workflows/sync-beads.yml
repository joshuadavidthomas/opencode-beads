name: sync-beads

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Sync beads
        id: sync
        run: ./scripts/sync-beads.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        if: steps.sync.outputs.beads_version
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-beads
          title: "sync: beads ${{ steps.sync.outputs.beads_version }}"
          body: "Automated sync of vendored beads files to ${{ steps.sync.outputs.beads_version }}"
          commit-message: "sync: beads ${{ steps.sync.outputs.beads_version }}"
